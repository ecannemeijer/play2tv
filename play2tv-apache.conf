<VirtualHost *:80>
    ServerName api.velixatv.com
    Redirect permanent / https://api.velixatv.com/
</VirtualHost>

<VirtualHost *:443>
    ServerName api.velixatv.com
    DocumentRoot /var/www/play2tv/public

    SSLEngine on
    SSLCertificateFile /etc/letsencrypt/live/api.velixatv.com/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/api.velixatv.com/privkey.pem

    <Directory /var/www/play2tv/public>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    # Deny access to sensitive directories
    <DirectoryMatch "^/var/www/play2tv/(app|writable|tests|vendor)">
        Require all denied
    </DirectoryMatch>

    # Enable compression
    <IfModule mod_deflate.c>
        AddOutputFilterByType DEFLATE application/json text/html text/plain text/css application/javascript
    </IfModule>

    # Cache control for static assets
    <IfModule mod_expires.c>
        ExpiresActive On
        ExpiresByType image/jpeg "access plus 1 month"
        ExpiresByType image/png  "access plus 1 month"
    </IfModule>

    ErrorLog ${APACHE_LOG_DIR}/play2tv_error.log
    CustomLog ${APACHE_LOG_DIR}/play2tv_access.log combined
</VirtualHost>
