services:
  api:
    build: .
    container_name: play2tv_api
    restart: always
    volumes:
      - .:/var/www/html
    networks:
      - play2tv_net

  webserver:
    image: nginx:alpine
    container_name: play2tv_nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - .:/var/www/html
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - play2tv_net
    depends_on:
      - api

  db:
    image: mariadb:10.11
    container_name: play2tv_db
    restart: always
    environment:
      MARIADB_ROOT_PASSWORD: powerup12
      MARIADB_DATABASE: play2tv
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - play2tv_net

  redis:
    image: redis:7-alpine
    container_name: play2tv_redis
    command: redis-server --requirepass Dieselmax76!
    networks:
      - play2tv_net

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: play2tv_pma
    ports:
      - "8888:80"
    environment:
      - PMA_HOST=db
    networks:
      - play2tv_net

networks:
  play2tv_net:
    driver: bridge

volumes:
  db_data:
