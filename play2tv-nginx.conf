# =============================================================================
# Play2TV Nginx Configuration
# Voor Debian 13 met PHP-FPM en Let's Encrypt SSL
# =============================================================================
# Plaats dit bestand in /etc/nginx/sites-available/play2tv
# En symlink naar /etc/nginx/sites-enabled/:
#   ln -s /etc/nginx/sites-available/play2tv /etc/nginx/sites-enabled/
# =============================================================================

# -----------------------------------------------------------------------------
# HTTP → HTTPS Redirect
# -----------------------------------------------------------------------------
server {
    listen 80;
    listen [::]:80;
    server_name api.velixatv.com;

    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/play2tv/public;
        default_type text/plain;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# -----------------------------------------------------------------------------
# HTTPS Server
# -----------------------------------------------------------------------------
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.velixatv.com;

    # Document root (alleen de /public map is publiek)
    root /var/www/play2tv/public;
    index index.php index.html;

    # =========================================================================
    # SSL Certificaten (Let's Encrypt)
    # =========================================================================
    ssl_certificate     /etc/letsencrypt/live/api.velixatv.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.velixatv.com/privkey.pem;

    # SSL security (Mozilla Intermediate config)
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # HSTS (forceer HTTPS voor minimaal 2 jaar)
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # =========================================================================
    # Security Headers
    # =========================================================================
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-Permitted-Cross-Domain-Policies "none" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Resource-Policy "same-origin" always;

    # Content Security Policy (pas aan indien nodig voor je admin dashboard)
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://cdnjs.cloudflare.com; img-src 'self' data:; font-src 'self' https://cdnjs.cloudflare.com; connect-src 'self' wss://api.velixatv.com; form-action 'self'; base-uri 'self'; frame-ancestors 'none';" always;

    # =========================================================================
    # Gzip Compressie
    # =========================================================================
    gzip on;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        application/json
        application/javascript
        text/html
        text/plain
        text/css
        text/xml
        application/xml+rss
        image/svg+xml;
    gzip_vary on;
    gzip_proxied any;
    gzip_disable "msie6";

    # =========================================================================
    # Cache headers voor static assets
    # =========================================================================
    location ~* \.(jpg|jpeg|png|gif|ico|svg|webp|avif)$ {
        expires 30d;
        add_header Cache-Control "public, immutable" always;
        try_files $uri =404;
    }

    location ~* \.(css|js|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable" always;
        try_files $uri =404;
    }

    # =========================================================================
    # Blokkeer toegang tot gevoelige bestanden en mappen
    # =========================================================================

    # Verbied toegang tot verborgen bestanden (.env, .git, .htaccess, enz.)
    location ~ /\. {
        deny all;
        return 404;
    }

    # Verbied directe toegang tot composer bestanden
    location ~* composer\.(json|lock)$ {
        deny all;
        return 404;
    }

    # Verbied directe toegang tot PHP unit config
    location ~* phpunit\.xml {
        deny all;
        return 404;
    }

    # Verbied directe toegang tot package-lock.json
    location ~* package-lock\.json$ {
        deny all;
        return 404;
    }

    # Verbied toegang tot de app map, writable, tests, vendor, tools
    location ~ ^/(app|writable|tests|vendor|tools)/ {
        deny all;
        return 404;
    }

    # Verbied directe toegang tot spark en preload.php
    location ~ ^/(spark|preload\.php)$ {
        deny all;
        return 404;
    }

    # Verbied toegang tot LICENSE en README
    location ~ ^/(LICENSE|README\.md)$ {
        deny all;
        return 404;
    }

    # =========================================================================
    # Healthcheck endpoint (voor load balancers / monitoring)
    # =========================================================================
    location = /health {
        access_log off;
        return 200 "OK";
    }

    # =========================================================================
    # Update map (voor app updates)
    # =========================================================================
    location /update/ {
        root /var/www/play2tv;
        autoindex off;
        location ~* \.apk$ {
            add_header Content-Type application/vnd.android.package-archive;
        }
    }

    # =========================================================================
    # WebSocket Proxy voor Redis Admin Dashboard
    # =========================================================================
    location /redis-ws {
        proxy_pass http://127.0.0.1:8082/redis-ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # =========================================================================
    # Hoofdapplicatie: CodeIgniter 4 URL rewriting
    # =========================================================================
    location / {
        # Probeer eerst het bestand als statisch bestand te serveren
        try_files $uri $uri/ /index.php$is_args$args;
    }

    # =========================================================================
    # PHP-FPM verwerking
    # =========================================================================
    location ~ \.php$ {
        # Voorkom dat niet-bestaande PHP bestanden aan PHP-FPM worden doorgegeven
        try_files $uri =404;

        # PHP-FPM socket (Debian standaard)
        fastcgi_pass unix:/var/run/php/php-fpm.sock;

        # Als je TCP wilt gebruiken ipv socket:
        # fastcgi_pass 127.0.0.1:9000;

        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;

        # Standaard FastCGI parameters
        include fastcgi_params;

        # Extra parameters voor CodeIgniter
        fastcgi_param PATH_INFO $fastcgi_path_info;
        fastcgi_param HTTP_AUTHORIZATION $http_authorization;

        # Timeouts (verhoog voor lange API calls indien nodig)
        fastcgi_read_timeout 120s;
        fastcgi_send_timeout 120s;

        # Buffers
        fastcgi_buffers 16 16k;
        fastcgi_buffer_size 32k;
    }

    # =========================================================================
    # Logging
    # =========================================================================
    access_log /var/log/nginx/play2tv_access.log;
    error_log  /var/log/nginx/play2tv_error.log warn;

    # =========================================================================
    # Rate limiting zones (definieer in /etc/nginx/nginx.conf http block)
    # Voeg deze regels toe in je nginx.conf http block voordat je de
    # onderstaande limit_req directives uncomment:
    #
    # limit_req_zone $binary_remote_addr zone=play2tv_login:10m rate=5r/m;
    # limit_req_zone $binary_remote_addr zone=play2tv_api:10m rate=60r/m;
    # =========================================================================

    # Login rate limiting (optioneel - werkt samen met de applicatie-level rate limiting)
    # location = /api/login {
    #     limit_req zone=play2tv_login burst=3 nodelay;
    #     try_files $uri =404;
    #     fastcgi_pass unix:/var/run/php/php-fpm.sock;
    #     fastcgi_index index.php;
    #     fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
    #     include fastcgi_params;
    #     fastcgi_param PATH_INFO $fastcgi_path_info;
    #     fastcgi_param HTTP_AUTHORIZATION $http_authorization;
    # }
}